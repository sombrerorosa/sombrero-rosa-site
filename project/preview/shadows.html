<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bone); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card {
    width: 110px; height: 84px; border-radius: var(--r-lg);
    background: var(--paper); border: 1px solid var(--border);
  }
  .card.rosa-bloom { background: var(--hot); border-color: transparent; }
  .name { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--navy); }
  .desc { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); text-align: center; max-width: 16ch; line-height: 1.4; }
</style></head>
<body>
  <div class="row">
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-xs);"></div>
      <div class="name">--shadow-xs</div>
      <div class="desc">hairline lift</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-sm);"></div>
      <div class="name">--shadow-sm</div>
      <div class="desc">resting card</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-md);"></div>
      <div class="name">--shadow-md</div>
      <div class="desc">hover · floating</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-lg);"></div>
      <div class="name">--shadow-lg</div>
      <div class="desc">modal · overlay</div>
    </div>
    <div class="cell" style="grid-column: span 4; flex-direction: row; gap: 16px; padding-top: 8px; border-top: 1px dashed var(--border); justify-content: center;">
      <div class="card rosa-bloom" style="box-shadow: var(--shadow-rosa);"></div>
      <div>
        <div class="name">--shadow-rosa</div>
        <div class="desc" style="text-align:left;">colored bloom · primary CTA hover only</div>
      </div>
    </div>
  </div>
</body></html>
