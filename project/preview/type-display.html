<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bone); }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .display {
    font-family: var(--font-display); font-weight: 700;
    font-size: 76px; line-height: 0.96; letter-spacing: -0.025em;
    color: var(--navy); margin: 0;
  }
  .display em {
    font-style: italic; font-weight: 600; color: var(--rosa-500);
  }
  .lead { font-size: 18px; color: var(--ink-soft); max-width: 50ch; line-height: 1.5; margin: 6px 0 0; }
</style></head>
<body>
  <div class="stack">
    <h1 class="display">Hacemos crecer<br>tu <em>marca</em>.</h1>
    <p class="lead">Poppins Bold, 76 / 0.96, tracking −0.025em. Italic medium for the highlight word in <span style="color:var(--rosa-500); font-style:italic;">rose</span>.</p>
  </div>
</body></html>
