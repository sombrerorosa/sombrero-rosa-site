<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bone); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--rosa); border-radius: var(--r-xs); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); }
  .px { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--navy); }
</style></head>
<body>
  <div class="row">
    <div class="step"><div class="bar" style="width: 26px; height: 4px;"></div><div class="px">4</div><div class="name">space-1</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 8px;"></div><div class="px">8</div><div class="name">space-2</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 12px;"></div><div class="px">12</div><div class="name">space-3</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 16px;"></div><div class="px">16</div><div class="name">space-4</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 24px;"></div><div class="px">24</div><div class="name">space-5</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 32px;"></div><div class="px">32</div><div class="name">space-6</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 48px;"></div><div class="px">48</div><div class="name">space-7</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 64px;"></div><div class="px">64</div><div class="name">space-8</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 96px;"></div><div class="px">96</div><div class="name">space-9</div></div>
    <div class="step"><div class="bar" style="width: 26px; height: 128px;"></div><div class="px">128</div><div class="name">space-10</div></div>
  </div>
</body></html>
