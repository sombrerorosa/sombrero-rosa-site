<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bone); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card {
    background: var(--paper); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 18px 20px;
  }
  .eyebrow {
    font-size: 13px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--rosa-600); margin-bottom: 10px;
  }
  .headline {
    font-family: var(--font-display); font-weight: 700; font-size: 22px;
    color: var(--navy); letter-spacing: -0.01em; line-height: 1.15;
  }
  .pill {
    display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; padding: 4px 10px; border-radius: var(--r-pill);
    background: var(--rosa-100); color: var(--rosa-700);
  }
  .mono-tag {
    display: inline-block; font-family: var(--font-mono); font-size: 11px;
    background: var(--bone-2); color: var(--ink-soft);
    padding: 3px 8px; border-radius: var(--r-xs);
  }
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <div class="eyebrow">Servicios · 01</div>
      <div class="headline">Estrategia de marca</div>
    </div>
    <div class="card">
      <div class="eyebrow">Caso de éxito</div>
      <div class="headline">+182% en conversión</div>
    </div>
    <div class="card" style="display:flex; gap:8px; align-items:center;">
      <span class="pill">Nuevo</span>
      <span class="pill" style="background: var(--navy); color: var(--bone);">Premium</span>
      <span class="pill" style="background: transparent; color: var(--navy); box-shadow: inset 0 0 0 1px var(--border-strong);">Featured</span>
    </div>
    <div class="card" style="display:flex; gap:8px; align-items:center; flex-wrap: wrap;">
      <span class="mono-tag">--rosa</span>
      <span class="mono-tag">--space-5</span>
      <span class="mono-tag">--r-lg</span>
      <span class="mono-tag">--ease-out</span>
    </div>
  </div>
</body></html>
