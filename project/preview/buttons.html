<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bone); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; align-items: start; }
  .grp { display: flex; flex-direction: column; gap: 8px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .btn {
    font-family: var(--font-sans); font-weight: 600; font-size: 14px;
    padding: 12px 20px; border-radius: var(--r-md);
    border: 0; cursor: pointer; line-height: 1;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 200ms cubic-bezier(0.22,1,0.36,1);
  }
  .btn .arrow { transition: transform 200ms; }
  .btn:hover .arrow { transform: translateX(3px); }

  .btn-primary { background: var(--hot); color: white; }
  .btn-primary:hover { background: var(--rosa-600); box-shadow: var(--shadow-rosa); transform: translateY(-2px); }

  .btn-secondary { background: var(--navy); color: var(--bone); }
  .btn-secondary:hover { background: var(--navy-700); transform: translateY(-2px); }

  .btn-ghost { background: transparent; color: var(--navy); box-shadow: inset 0 0 0 1.5px var(--navy); }
  .btn-ghost:hover { background: var(--navy); color: var(--bone); }

  .btn-pill { border-radius: var(--r-pill); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }

  .btn[disabled] { opacity: .4; pointer-events: none; }
</style></head>
<body>
  <div class="grid">
    <div class="grp">
      <div class="lbl">Primary</div>
      <div class="row">
        <button class="btn btn-primary">Hablemos <span class="arrow">→</span></button>
        <button class="btn btn-primary btn-sm">Empezar</button>
      </div>
    </div>
    <div class="grp">
      <div class="lbl">Secondary</div>
      <div class="row">
        <button class="btn btn-secondary">Ver caso <span class="arrow">→</span></button>
        <button class="btn btn-secondary btn-sm">Saber más</button>
      </div>
    </div>
    <div class="grp">
      <div class="lbl">Ghost</div>
      <div class="row">
        <button class="btn btn-ghost">Servicios</button>
        <button class="btn btn-ghost btn-sm">Conocer</button>
      </div>
    </div>
    <div class="grp">
      <div class="lbl">Pill nav</div>
      <div class="row">
        <button class="btn btn-primary btn-pill btn-sm">Quiero crecer →</button>
        <button class="btn btn-ghost btn-pill btn-sm">Contacto</button>
      </div>
    </div>
    <div class="grp" style="grid-column: span 2;">
      <div class="lbl">States</div>
      <div class="row">
        <button class="btn btn-primary">Default</button>
        <button class="btn btn-primary" style="background: var(--rosa-600); box-shadow: var(--shadow-rosa); transform: translateY(-2px);">Hover</button>
        <button class="btn btn-primary" style="background: var(--rosa-700); transform: translateY(1px);">Press</button>
        <button class="btn btn-primary" disabled>Disabled</button>
      </div>
    </div>
  </div>
</body></html>
