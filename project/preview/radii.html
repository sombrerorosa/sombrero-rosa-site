<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bone); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box {
    width: 78px; height: 78px;
    background: var(--rosa-100);
    border: 1.5px solid var(--rosa);
  }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); }
  .px { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--navy); }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius: var(--r-xs);"></div><div class="px">4 px</div><div class="label">--r-xs</div></div>
    <div class="cell"><div class="box" style="border-radius: var(--r-sm);"></div><div class="px">8 px</div><div class="label">--r-sm</div></div>
    <div class="cell"><div class="box" style="border-radius: var(--r-md);"></div><div class="px">14 px</div><div class="label">--r-md · buttons</div></div>
    <div class="cell"><div class="box" style="border-radius: var(--r-lg);"></div><div class="px">22 px</div><div class="label">--r-lg · cards</div></div>
    <div class="cell"><div class="box" style="border-radius: var(--r-xl);"></div><div class="px">32 px</div><div class="label">--r-xl · panels</div></div>
    <div class="cell"><div class="box" style="border-radius: var(--r-pill);"></div><div class="px">pill</div><div class="label">--r-pill</div></div>
  </div>
</body></html>
