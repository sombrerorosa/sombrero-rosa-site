<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sombrero Rosa — Agencia que conecta</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="../../assets/logo-sombrero-rosa.png" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Tools.jsx"></script>
  <script type="text/babel" src="Manifesto.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    const { Header, Hero, Services, Tools, Manifesto, Contact, Footer } = window.SR;

    function App() {
      React.useEffect(() => { if (window.lucide) lucide.createIcons(); }, []);
      return (
        <div className="sr-page">
          <Header />
          <main>
            <Hero />
            <Services />
            <Tools />
            <Manifesto />
            <Contact />
          </main>
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
